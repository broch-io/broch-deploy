# Broch — production docker-compose with BUNDLED Postgres + Caddy
# using a BYO (bring-your-own) wildcard cert.
#
# Variant of ../with-postgres/ that uses a static cert+key pair instead of
# Caddy's automatic ACME issuance. Use this when:
#   - Your DNS provider isn't on the Caddy-DNS list (so DNS-01 isn't an
#     option without a custom build)
#   - You manage certs centrally with your own renewal automation
#     (certbot, your security team's PKI, a wildcard purchased from a CA)
#   - You're in an air-gapped or restricted-egress network where Caddy
#     can't reach Let's Encrypt during issuance
#
# Caddy here is the stock caddy:2 image — no custom xcaddy build needed,
# since we're not using any DNS provider modules.

services:
  broch:
    # Default is the public image, pinned to a concrete version (NOT :latest) so a
    # `docker compose pull` never silently rolls the box across an EF-migration boundary.
    # New releases of this template bump this default; override BROCH_VERSION=latest to float.
    # BROCH_IMAGE overrides the repo for a private mirror or a pre-release/beta image
    # (set the registry login in your .env / deploy if it's private).
    image: ${BROCH_IMAGE:-ghcr.io/broch-io/broch}:${BROCH_VERSION:-1.30.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      API__WILDCARDHOSTNAME: ${BROCH_WILDCARD_HOSTNAME}
      # Public IP broch advertises for auto-DNS (seeded at deploy, admin-overridable). See with-postgres.
      # Byo-cert has auto-DNS off, so this is inert here, but kept for parity across the compose files.
      API__PUBLICIP: ${BROCH_PUBLIC_IP:-}
      # Trusted-proxy CIDRs so Caddy's X-Forwarded-For/-Proto are honored (first boot only,
      # admin-overridable). See with-postgres for the full rationale.
      API__TRUSTEDPROXYCIDRS: ${BROCH_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      BROCH_MASTER_KEY: ${BROCH_MASTER_KEY}
      # Identity provider — part of the boot floor. The server starts without
      # these, but no one can sign in (or finish setup) until they're set; a
      # license is activated in-app (Admin → License), not here. See .env.example / README.
      #
      # Required for every provider:
      AUTHENTICATION__PROVIDER: ${AUTHENTICATION__PROVIDER:-}
      AUTHENTICATION__CLIENTID: ${AUTHENTICATION__CLIENTID:-}
      AUTHENTICATION__CLIENTSECRET: ${AUTHENTICATION__CLIENTSECRET:-}
      AUTHENTICATION__ADMINROLES: ${AUTHENTICATION__ADMINROLES:-}
      # Provider-specific — set only what your provider needs:
      #   Auth0/Okta → DOMAIN (Auth0 RBAC also → AUDIENCE) · AzureAd/Entra → TENANTID + INSTANCE · generic OIDC → AUTHORITY
      AUTHENTICATION__DOMAIN: ${AUTHENTICATION__DOMAIN:-}
      AUTHENTICATION__TENANTID: ${AUTHENTICATION__TENANTID:-}
      AUTHENTICATION__INSTANCE: ${AUTHENTICATION__INSTANCE:-}
      AUTHENTICATION__AUTHORITY: ${AUTHENTICATION__AUTHORITY:-}
      AUTHENTICATION__AUDIENCE: ${AUTHENTICATION__AUDIENCE:-}
      DATABASE__PROVIDER: PostgreSQL
      ConnectionStrings__BrochConnection: Host=postgres;Database=${POSTGRES_DB:-brochdb};Username=${POSTGRES_USER:-broch};Password=${POSTGRES_PASSWORD}
    expose:
      - "8080"
    healthcheck:
      # bash /dev/tcp probe, not curl: broch images ≤1.23.0 ship no curl/wget
      # (bash is present in the Debian-based aspnet image).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n1 <&3 | grep -q ' 200 '"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brochdb}
      POSTGRES_USER: ${POSTGRES_USER:-broch}
      # Required -- postgres:17 rejects an empty password (set it in .env; the VM appliance injects it).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-broch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    # Stock caddy:2 — no DNS modules needed since we're not doing ACME.
    # No environment either: the Caddyfile serves a catch-all :443 with the
    # mounted cert, so it never reads the hostname.
    image: caddy:2
    restart: unless-stopped
    depends_on:
      broch:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Your cert + key. PEM format — the same files certbot or a commercial
      # CA gives you. Read-only mounts; rotate by replacing the files on disk
      # and `docker compose exec caddy caddy reload`.
      - ./certs/fullchain.pem:/etc/caddy/certs/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/caddy/certs/privkey.pem:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
