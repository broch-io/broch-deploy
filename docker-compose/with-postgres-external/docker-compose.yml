# Broch — production docker-compose with EXTERNAL Postgres + Caddy auto-TLS
#
# Variant of ../with-postgres/ that drops the bundled postgres service.
# Use this when:
#   - Your DB is a managed service (DO Managed Databases, RDS, Azure Flex,
#     CloudSQL, Neon, Supabase, …) and you point Broch at a connection string
#   - You need encryption-at-rest, point-in-time recovery, automated backups,
#     or a maintenance/upgrade flow you don't want to operate yourself
#   - You need horizontal scaling — multi-replica Broch requires a shared
#     external DB
#
# Caddy still handles TLS exactly the same way as ../with-postgres/ —
# wildcard certs via ACME DNS-01 with Cloudflare by default.

services:
  broch:
    # Default is the public image, pinned to a concrete version (NOT :latest) so a
    # `docker compose pull` never silently rolls the box across an EF-migration boundary.
    # New releases of this template bump this default; override BROCH_VERSION=latest to float.
    # BROCH_IMAGE overrides the repo for a private mirror or a pre-release/beta image
    # (set the registry login in your .env / deploy if it's private).
    image: ${BROCH_IMAGE:-ghcr.io/broch-io/broch}:${BROCH_VERSION:-1.26.0}
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      API__WILDCARDHOSTNAME: ${BROCH_WILDCARD_HOSTNAME}
      BROCH_MASTER_KEY: ${BROCH_MASTER_KEY}
      # Identity provider — part of the boot floor. The server starts without
      # these, but no one can sign in (or finish setup) until they're set; a
      # license is activated in-app (Admin → License), not here. See .env.example / README.
      #
      # Required for every provider:
      AUTHENTICATION__PROVIDER: ${AUTHENTICATION__PROVIDER:-}
      AUTHENTICATION__CLIENTID: ${AUTHENTICATION__CLIENTID:-}
      AUTHENTICATION__CLIENTSECRET: ${AUTHENTICATION__CLIENTSECRET:-}
      AUTHENTICATION__ADMINROLES: ${AUTHENTICATION__ADMINROLES:-}
      # Provider-specific — set only what your provider needs:
      #   Auth0/Okta → DOMAIN (Auth0 RBAC also → AUDIENCE) · AzureAd/Entra → TENANTID + INSTANCE · generic OIDC → AUTHORITY
      AUTHENTICATION__DOMAIN: ${AUTHENTICATION__DOMAIN:-}
      AUTHENTICATION__TENANTID: ${AUTHENTICATION__TENANTID:-}
      AUTHENTICATION__INSTANCE: ${AUTHENTICATION__INSTANCE:-}
      AUTHENTICATION__AUTHORITY: ${AUTHENTICATION__AUTHORITY:-}
      AUTHENTICATION__AUDIENCE: ${AUTHENTICATION__AUDIENCE:-}
      DATABASE__PROVIDER: PostgreSQL
      # Connection string points at your external DB. SSL Mode=Require is
      # standard for managed services; relax to Prefer or Disable if your
      # provider doesn't support TLS to the server.
      ConnectionStrings__DefaultConnection: ${BROCH_DB_CONNECTION_STRING}
    expose:
      - "8080"
    healthcheck:
      # bash /dev/tcp probe, not curl: broch images ≤1.23.0 ship no curl/wget
      # (bash is present in the Debian-based aspnet image).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n1 <&3 | grep -q ' 200 '"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    # Caddy with the DNS-01 provider modules baked in — broch needs DNS-01 for
    # wildcard certs and stock caddy:2 lacks them. The image is independent of broch
    # source, so it is NOT pinned to BROCH_VERSION — always :latest (Trivy-scanned and
    # weekly-refreshed for CVEs; there is no per-channel tag like broch-caddy:dev).
    # Escape hatch for an unlisted DNS provider: comment out `image:` and
    # uncomment the `build:` block to compile from the local Caddy.Dockerfile.
    image: ghcr.io/broch-io/broch-caddy:latest
    # build:
    #   context: .
    #   dockerfile: Caddy.Dockerfile
    restart: unless-stopped
    depends_on:
      broch:
        condition: service_healthy
    environment:
      BROCH_WILDCARD_HOSTNAME: ${BROCH_WILDCARD_HOSTNAME}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
      # DNS-01 credentials — these let Caddy prove domain ownership (via a TXT record) so it
      # can issue your wildcard TLS cert. CERT ISSUANCE ONLY — never user sign-in (login is the
      # AUTHENTICATION__* vars on the broch service above). Set whichever your tls.caddy provider
      # needs; leave the rest empty. Grouped per provider, same order as .env.example.
      # Cloudflare (default tls.caddy) — scoped API token, Zone:Read + DNS:Edit on the zone:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      # Azure DNS — credentials for Caddy's DNS-01 ACME challenge (to issue the wildcard
      # cert), NOT app sign-in: the IdP/login creds are the AUTHENTICATION__* vars on the
      # broch service above. Managed identity needs only subscription + resource group
      # (no secret); service-principal mode adds tenant/client/secret:
      AZURE_DNS_SUBSCRIPTION_ID: ${AZURE_DNS_SUBSCRIPTION_ID:-}
      AZURE_DNS_RESOURCE_GROUP: ${AZURE_DNS_RESOURCE_GROUP:-}
      AZURE_DNS_TENANT_ID: ${AZURE_DNS_TENANT_ID:-}
      AZURE_DNS_CLIENT_ID: ${AZURE_DNS_CLIENT_ID:-}
      AZURE_DNS_CLIENT_SECRET: ${AZURE_DNS_CLIENT_SECRET:-}
      # AWS Route 53 — the standard AWS SDK env names (kept verbatim so the SDK recognizes
      # them); used here only for Route 53 DNS, not for any other AWS service:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Google Cloud DNS — GOOGLE_APPLICATION_CREDENTIALS is the standard Google ADC env var
      # (a path to the service-account JSON in ./certs); the SDK reads it by that exact name,
      # so it is not renamed. GCP_PROJECT is the project hosting the DNS zone:
      GCP_PROJECT: ${GCP_PROJECT:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      # DigitalOcean — personal access token with write scope on DNS:
      DO_AUTH_TOKEN: ${DO_AUTH_TOKEN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./tls.caddy:/etc/caddy/tls.caddy:ro
      # BYO-cert deployments place their wildcard cert+key here and use a Caddyfile that
      # references them (auto-TLS deployments leave this empty).
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
