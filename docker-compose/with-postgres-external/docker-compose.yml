# Broch — production docker-compose with EXTERNAL Postgres + Caddy auto-TLS
#
# Variant of ../with-postgres/ that drops the bundled postgres service.
# Use this when:
#   - Your DB is a managed service (DO Managed Databases, RDS, Azure Flex,
#     CloudSQL, Neon, Supabase, …) and you point Broch at a connection string
#   - You need encryption-at-rest, point-in-time recovery, automated backups,
#     or a maintenance/upgrade flow you don't want to operate yourself
#   - You need horizontal scaling — multi-replica Broch requires a shared
#     external DB
#
# Caddy still handles TLS exactly the same way as ../with-postgres/ —
# wildcard certs via ACME DNS-01 with Cloudflare by default.

services:
  broch:
    image: ghcr.io/broch-io/broch:${BROCH_VERSION:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      API__WILDCARDHOSTNAME: ${BROCH_WILDCARD_HOSTNAME}
      BROCH_MASTER_KEY: ${BROCH_MASTER_KEY}
      # Identity provider — part of the boot floor. The server starts without
      # these, but no one can sign in (or finish setup) until they're set; a
      # license is activated in-app (Admin → License), not here. See .env.example / README.
      #
      # Required for every provider:
      AUTHENTICATION__PROVIDER: ${AUTHENTICATION__PROVIDER:-}
      AUTHENTICATION__CLIENTID: ${AUTHENTICATION__CLIENTID:-}
      AUTHENTICATION__CLIENTSECRET: ${AUTHENTICATION__CLIENTSECRET:-}
      AUTHENTICATION__ADMINROLES: ${AUTHENTICATION__ADMINROLES:-}
      # Provider-specific — set only what your provider needs:
      #   Auth0/Okta → DOMAIN (Auth0 RBAC also → AUDIENCE) · AzureAd/Entra → TENANTID + INSTANCE · generic OIDC → AUTHORITY
      AUTHENTICATION__DOMAIN: ${AUTHENTICATION__DOMAIN:-}
      AUTHENTICATION__TENANTID: ${AUTHENTICATION__TENANTID:-}
      AUTHENTICATION__INSTANCE: ${AUTHENTICATION__INSTANCE:-}
      AUTHENTICATION__AUTHORITY: ${AUTHENTICATION__AUTHORITY:-}
      AUTHENTICATION__AUDIENCE: ${AUTHENTICATION__AUDIENCE:-}
      AUTHENTICATION__SCOPES: ${AUTHENTICATION__SCOPES:-}
      # Central (license/management) server. Defaults to the public Broch central server.
      CENTRALSERVER__APIURL: ${CENTRALSERVER__APIURL:-https://api.broch.io}
      DATABASE__PROVIDER: PostgreSQL
      # Connection string points at your external DB. SSL Mode=Require is
      # standard for managed services; relax to Prefer or Disable if your
      # provider doesn't support TLS to the server.
      ConnectionStrings__DefaultConnection: ${BROCH_DB_CONNECTION_STRING}
      # Observability (all optional). SEED values mirrored into the DB on first boot (so they
      # survive a re-provision). Logging (Datadog) is supported AND configurable in-app (Admin ->
      # Settings overrides it on the next restart). Telemetry (Application Insights) is
      # EXPERIMENTAL / WIP and NOT configurable in-app — deploy-time only; prefer leaving it empty.
      BROCHTELEMETRY__PROVIDER: ${BROCHTELEMETRY__PROVIDER:-}
      BROCHTELEMETRY__APPLICATIONINSIGHTSCONNECTIONSTRING: ${BROCHTELEMETRY__APPLICATIONINSIGHTSCONNECTIONSTRING:-}
      BROCHLOGGING__PROVIDER: ${BROCHLOGGING__PROVIDER:-}
      BROCHLOGGING__DATADOG__APIKEY: ${BROCHLOGGING__DATADOG__APIKEY:-}
      BROCHLOGGING__DATADOG__SERVICENAME: ${BROCHLOGGING__DATADOG__SERVICENAME:-}
      BROCHLOGGING__DATADOG__ENVIRONMENT: ${BROCHLOGGING__DATADOG__ENVIRONMENT:-}
      BROCHLOGGING__DATADOG__SITE: ${BROCHLOGGING__DATADOG__SITE:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
    expose:
      - "8080"
    healthcheck:
      # bash /dev/tcp probe, not curl: broch images ≤1.23.0 ship no curl/wget
      # (bash is present in the Debian-based aspnet image).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n1 <&3 | grep -q ' 200 '"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    # Built from Caddy.Dockerfile (shared with ../with-postgres/) — stock
    # caddy:2 lacks DNS modules and broch needs DNS-01 for wildcard certs.
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    image: broch-deploy/caddy:dns
    restart: unless-stopped
    depends_on:
      broch:
        condition: service_healthy
    environment:
      BROCH_WILDCARD_HOSTNAME: ${BROCH_WILDCARD_HOSTNAME}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
      # DNS-01 credentials — set whichever your tls.caddy provider needs (the rest stay
      # empty). Azure DNS uses the VM's managed identity, so it needs no secret here.
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
      AZURE_DNS_RESOURCE_GROUP: ${AZURE_DNS_RESOURCE_GROUP:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./tls.caddy:/etc/caddy/tls.caddy:ro
      # BYO-cert deployments place their wildcard cert+key here and use a Caddyfile that
      # references them (auto-TLS deployments leave this empty).
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
