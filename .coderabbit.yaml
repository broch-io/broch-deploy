# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Public release repository: CodeRabbit reviews every PR into main in a quiet
# profile and provides the independent approval on release PRs. Changes land
# here through the release pipeline described in RELEASING.md, so reviews focus
# on real defects rather than style.
reviews:
  profile: chill
  high_level_summary: true
  poem: false
  collapse_walkthrough: true
  review_status: true
  # Enables CodeRabbit's request-changes/approve workflow — its APPROVED review is
  # what satisfies the required-review rule on release PRs.
  request_changes_workflow: true
  auto_review:
    enabled: true
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: "off"
    description:
      mode: "off"
    issue_assessment:
      mode: "off"
