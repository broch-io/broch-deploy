# Tier-1 static checks for the Terraform examples.
#
# Goal: catch typos, bad references, missing required variables, and format
# drift before a PR gets merged. Does NOT talk to any cloud provider — no
# AWS/Azure credentials needed, no resources created, no billable activity.
#
# Why no `terraform plan` or `apply`: this repo is public and we don't want
# workflow logs leaking account state, resource ARNs, or IPs. Real apply
# testing happens out-of-CI via scripts/test-terraform.sh, run manually
# before tagging a release.
#
# COVERAGE NOTE: these jobs are VALIDATE-ONLY -- they check formatting (fmt) and configuration
# validity (validate) but do NOT stand the modules up, so they assert no runtime health.

name: Terraform Validate

# No paths filter on pull_request: validate (aws-ecs) and
# validate (azure-container-apps) are required checks in the main ruleset,
# and a path-filtered workflow never reports on PRs outside its paths —
# leaving them BLOCKED forever. The jobs are fast; run them on every PR.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'cloudformation/**'
      - '.github/workflows/terraform-validate.yml'

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.module }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - aws-ecs
          - azure-container-apps
          - digitalocean

    defaults:
      run:
        working-directory: terraform/${{ matrix.module }}

    steps:
      - uses: actions/checkout@v6

      # Pinned Terraform version so the checks are reproducible.
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      # -backend=false skips backend initialisation (which would require cloud
      # credentials). Provider plugins are still downloaded and validated.
      - name: terraform init
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  # cloud-init delivers its config as droplet user_data, and cloud-init's YAML
  # loader rejects multi-byte UTF-8 there: a stray em-dash surfaces as
  # 'unacceptable character #x0080' and the ENTIRE cloud-config is silently
  # discarded, booting the droplet to bare Ubuntu while `terraform apply` still
  # goes green. `terraform validate` never executes cloud-init, so it can't
  # catch this. Keep cloud-init files pure ASCII.
  cloud-init-ascii:
    name: cloud-init ASCII guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject non-ASCII bytes in cloud-init files
        run: |
          # Scan the WHOLE repo, not just terraform/: the Azure VM appliance ships its cloud-init from
          # bicep/azure-vm/cloud-init.yaml, which is base64'd into customData and discarded just as
          # silently on a stray multi-byte char. (Earlier this only scanned terraform/, so the Bicep
          # cloud-init was unguarded.)
          hits=$(grep -rlP "[^\x00-\x7F]" --include='cloud-init*.yaml' . || true)
          if [ -n "$hits" ]; then
            echo "::error::Non-ASCII characters in cloud-init file(s). See lines below:"
            grep -rnP "[^\x00-\x7F]" --include='cloud-init*.yaml' . || true
            exit 1
          fi
          echo "cloud-init files are ASCII-clean."

  # The CloudFormation appliance (cloudformation/**) has no provider-native validate command the
  # way the Terraform modules (`terraform validate`) and Bicep templates (`az bicep build`) do,
  # so cfn-lint fills that role here. It statically checks
  # the template: bad !Ref/!Sub/!GetAtt, malformed Fn::Sub variables (e.g. a stray ${...} in a
  # UserData comment), unresolved Conditions/Rules, and resource-schema errors -- before a customer's
  # `aws cloudformation deploy` is the first thing to find them. Lints the SOURCE template; the
  # __*_B64__ placeholders are inert strings to cfn-lint.
  cfn-lint:
    name: cfn-lint (cloudformation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cfn-lint
        run: python3 -m pip install --quiet cfn-lint
      - name: Lint CloudFormation templates
        # Quoted glob: cfn-lint expands ** itself (recursive), so new cloudformation/<target>/
        # templates are covered automatically.
        run: cfn-lint "cloudformation/**/*.yaml"
