#cloud-config
# Broch -- Cloud-Init for DigitalOcean Droplet
# Copyright (c) 2026 Broch, LLC. All rights reserved.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg

write_files:
  # Docker Compose configuration
  - path: /opt/broch/docker-compose.yml
    permissions: "0644"
    content: |
      # Broch -- Docker Compose (DigitalOcean Droplet)
      # Copyright (c) 2026 Broch, LLC. All rights reserved.
      services:
        broch-server:
          image: ${image}:${image_tag}
          container_name: broch-server
          restart: unless-stopped
          env_file:
            - .env
          environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - ASPNETCORE_URLS=http://+:8080
            # Trusted-proxy CIDRs so Caddy's X-Forwarded-For/-Proto are honored (broch trusts
            # only loopback by default). Covers Docker's default address pool, which the
            # broch-network bridge below is allocated from. First boot only -- the value in
            # Admin -> Share Settings wins afterwards.
            - API__TRUSTEDPROXYCIDRS=172.16.0.0/12
            - DATABASE__PROVIDER=PostgreSQL
            # POSTGRES_PASSWORD is generated on-box at first boot and lives in .env (compose
            # interpolates $${POSTGRES_PASSWORD} from /opt/broch/.env). It is never baked into
            # droplet user_data. See the runcmd that generates it.
            - ConnectionStrings__BrochConnection=Host=postgres;Database=brochdb;Username=broch;Password=$${POSTGRES_PASSWORD}
          depends_on:
            postgres:
              condition: service_healthy
          # No state volumes: Data Protection keys and the SSH host key persist in
          # PostgreSQL. Recovery-critical state is the Postgres data + BROCH_MASTER_KEY.
          # No healthcheck -- aspnet image has no curl/wget/nc.
          # Restart policy handles crashes; Caddy retries upstream.
          logging:
            driver: "json-file"
            options:
              max-size: "10m"
              max-file: "3"

        caddy:
          build:
            context: .
            dockerfile: Dockerfile.caddy
          container_name: broch-caddy
          restart: unless-stopped
          depends_on:
            - broch-server
          ports:
            - "443:443"
          environment:
            - WILDCARD_HOSTNAME=${wildcard_hostname}
            # Provider-specific env var the canonical tls fragment reads its token from
            # (e.g. CLOUDFLARE_API_TOKEN); dns_env_var is chosen per dns_provider in main.tf.
            - ${dns_env_var}=${dns_api_token}
          volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - ./tls.caddy:/etc/caddy/tls.caddy:ro
            - caddy_data:/data
            - caddy_config:/config
          logging:
            driver: "json-file"
            options:
              max-size: "5m"
              max-file: "3"

        postgres:
          image: postgres:16-alpine
          container_name: broch-postgres
          restart: unless-stopped
          environment:
            - POSTGRES_DB=brochdb
            - POSTGRES_USER=broch
            # Sourced from /opt/broch/.env (generated on-box at first boot), never from
            # droplet user_data. postgres:16 rejects an empty password, so the runcmd that
            # writes .env MUST land before the stack starts (it does -- see runcmd order).
            - POSTGRES_PASSWORD=$${POSTGRES_PASSWORD}
          volumes:
            - /mnt/broch-data/postgresql:/var/lib/postgresql/data
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U broch"]
            interval: 10s
            timeout: 5s
            retries: 5
          logging:
            driver: "json-file"
            options:
              max-size: "5m"
              max-file: "3"

      volumes:
        caddy_data:
        caddy_config:

      networks:
        default:
          name: broch-network

  # Caddy reverse proxy configuration
  - path: /opt/broch/Caddyfile
    permissions: "0644"
    content: |
      # Broch -- Caddy Reverse Proxy
      # Copyright (c) 2026 Broch, LLC. All rights reserved.
      #
      # Automatic wildcard TLS via Let's Encrypt DNS-01 challenge.
      # Caddy generates and renews the certificate automatically --
      # no manual cert management required.
      #
      # The tls block is imported from /opt/broch/tls.caddy (the canonical caddy-tls fragment for
      # var.dns_provider). Supported: digitalocean, cloudflare, godaddy (single-token DNS-01 providers).

      {$WILDCARD_HOSTNAME}, *.{$WILDCARD_HOSTNAME} {
      	# Apex + wildcard share ONE site block (one ACME order) so a slow/replacing TXT upsert can't
      	# race issuance. The tls { dns ... } block (with propagation tuning) is the canonical fragment
      	# docker-compose/caddy-tls/<provider>.caddy, written to /opt/broch/tls.caddy by write_files
      	# below and imported here -- identical mechanism to the compose + VM-appliance targets.
      	import /etc/caddy/tls.caddy

      	# Ride out a broch restart/upgrade (broch-server briefly unreachable)
      	# by retrying the dial for up to 30s, instead of returning an immediate
      	# 502. Connection-level only.
      	reverse_proxy broch-server:8080 {
      		lb_try_duration 30s
      		lb_try_interval 250ms
      	}
      }

  # The canonical Caddy DNS-01 tls fragment (docker-compose/caddy-tls/<provider>.caddy), imported by
  # the Caddyfile above -- same mechanism as the compose + VM-appliance targets. indent()+trimspace
  # keep the `content: |` block-scalar alignment; the fragment's {env.*} refs are NOT Terraform
  # template syntax (no leading dollar), so templatefile passes them through to Caddy untouched.
  - path: /opt/broch/tls.caddy
    permissions: "0644"
    content: |
      ${indent(6, trimspace(tls_fragment))}

  # Custom Caddy build with DNS provider plugins
  - path: /opt/broch/Dockerfile.caddy
    permissions: "0644"
    content: |
      FROM caddy:2-builder AS builder

      RUN xcaddy build \
          --with github.com/caddy-dns/godaddy \
          --with github.com/caddy-dns/cloudflare \
          --with github.com/caddy-dns/digitalocean

      FROM caddy:2-alpine

      COPY --from=builder /usr/bin/caddy /usr/bin/caddy

  # Environment variables
  - path: /opt/broch/.env
    permissions: "0600"
    content: |
      # Generated on first boot by the runcmd below - never supplied by the operator.
      # Persisted to /mnt/broch-data/master-key on the block volume and restored on a droplet
      # recreate, so Data Protection keys sealed with it stay decryptable.
      BROCH_MASTER_KEY=__GENERATED_AT_RUNTIME__
      # Bundled-Postgres password, generated on-box at first boot (kept OUT of droplet
      # user_data). compose interpolates $${POSTGRES_PASSWORD} from this file.
      POSTGRES_PASSWORD=__GENERATED_AT_RUNTIME__
      CentralServer__ApiUrl=${central_server_url}
      API__WILDCARDHOSTNAME=${wildcard_hostname}
      AUTHENTICATION__PROVIDER=${auth_provider}
      AUTHENTICATION__CLIENTID=${auth_client_id}
      AUTHENTICATION__CLIENTSECRET=${auth_client_secret}
      AUTHENTICATION__TENANTID=${auth_tenant_id}
      AUTHENTICATION__INSTANCE=${auth_instance}
      AUTHENTICATION__DOMAIN=${auth_domain}
      AUTHENTICATION__AUDIENCE=${auth_audience}
      AUTHENTICATION__AUTHORITY=${auth_authority}
      AUTHENTICATION__ADMINROLES=${admin_roles}

  # Systemd service for auto-start on reboot
  - path: /etc/systemd/system/broch.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Broch (Docker Compose)
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/broch
      # --force-recreate --remove-orphans makes every boot converge to the declared stack from any prior
      # state. After an unclean stop a container can be left half-created that a plain `up -d` will
      # neither start nor replace, leaving the stack down until manual action. Force-recreate replaces
      # them; named volumes are preserved, so this is idempotent and never loses data.
      ExecStart=/usr/bin/docker compose up -d --force-recreate --remove-orphans
      ExecStop=/usr/bin/docker compose down

      [Install]
      WantedBy=multi-user.target

  # Metadata-firewall helper -- drops container access to the DO link-local metadata endpoint.
  - path: /opt/broch/metadata-firewall.sh
    permissions: "0755"
    content: |
      #!/bin/sh
      # Drop traffic from the docker bridges to the DigitalOcean link-local metadata endpoint.
      #
      # Droplet user_data carries the IdP client secret (AUTHENTICATION__CLIENTSECRET) and the DNS-01
      # token, and DigitalOcean serves it at http://169.254.169.254/metadata/v1/user_data to ANY
      # process in ANY container on the box. The broch/caddy/postgres containers have no legitimate use
      # for droplet metadata, so drop it in DOCKER-USER -- the chain Docker guarantees is traversed for
      # bridge-forwarded traffic -- closing the in-container read path. (The DO-API path, readable by an
      # account-token holder, is a separate residual documented in README.md; this does not address it.)
      #
      # This is the zero-operator-cost partial the azure-vm (Key Vault) / aws-vm (Secrets Manager)
      # boot-fetch achieves fully; DigitalOcean has no per-droplet managed-secret store to fetch from.
      #
      # Installed by broch-metadata-firewall.service before dockerd starts (Before=docker.service) and
      # re-applied on any dockerd restart (PartOf=docker.service). On reboot the kernel tables start empty
      # so the rule must be rebuilt before containers come back; across a mid-uptime daemon restart Docker
      # preserves DOCKER-USER, so the re-apply is a harmless no-op that guarantees the rule regardless.
      set -eu
      # Create the chain ourselves: this runs before dockerd (Before=docker.service), so DOCKER-USER may
      # not exist yet. dockerd reuses this same chain and adds the FORWARD -> DOCKER-USER jump itself.
      iptables -N DOCKER-USER 2>/dev/null || true
      iptables -C DOCKER-USER -d 169.254.169.254/32 -j DROP 2>/dev/null || iptables -I DOCKER-USER -d 169.254.169.254/32 -j DROP

  # Installs the metadata firewall before dockerd starts containers, re-applied on any dockerd restart.
  - path: /etc/systemd/system/broch-metadata-firewall.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Broch -- block container access to the droplet metadata endpoint
      # The DROP rule must be in DOCKER-USER BEFORE dockerd starts containers. The compose services carry
      # restart: unless-stopped, so on reboot dockerd itself resurrects them as docker.service starts -- an
      # After=docker.service rule would land after the containers are already running, leaving a window on
      # 169.254.169.254. Before=docker.service installs the rule first (the script creates the DOCKER-USER
      # chain itself with iptables -N; Docker preserves user rules in that chain across its start and only
      # adds the FORWARD -> DOCKER-USER jump). PartOf=docker.service restarts this oneshot with
      # docker.service, so a mid-uptime dockerd restart re-applies the rule before the containers return too.
      Before=docker.service
      PartOf=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/opt/broch/metadata-firewall.sh

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Swap: the s-1vcpu-1gb default has too little RAM for the one-time `xcaddy`
  # build of the custom Caddy image (a Go compile of the DNS plugins), which gets
  # OOM-killed on a bare 1 GB droplet. A 2 GB swapfile lets the build complete and
  # is cheap insurance on larger sizes too. Idempotent across cloud-init re-runs.
  - |
    if [ ! -f /swapfile ]; then
      fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      echo '/swapfile none swap sw 0 0' >> /etc/fstab
    fi

  # Install Docker Engine
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Format and mount block storage volume.
  #
  # HARD DEPENDENCY: the postgres password and the BROCH_MASTER_KEY are persisted ON this volume
  # (see the runcmds below) so they survive a droplet recreate. The DO volume's by-id udev symlink
  # can lag behind cloud-init -- if we proceed before it appears, the mount is silently skipped,
  # those secrets land on the (ephemeral) rootfs, and the fstab entry is missing. So we
  # `udevadm settle` and then bounded-retry for the device, and HARD-FAIL if it never shows: a loud
  # failure here is far better than a silently broken DB / non-recoverable Data Protection keys.
  - mkdir -p /mnt/broch-data
  - |
    # Fail-closed mount guard for broch.service, written FIRST. It is load-bearing on SUBSEQUENT
    # REBOOTS: cloud-init/runcmd runs only on first boot, but systemd still starts broch.service on
    # every boot (WantedBy=multi-user.target), so a later boot where the volume fails to remount needs
    # a guard runcmd cannot provide. (On first boot the mount hard-fail above already halts the rest of
    # runcmd -- items concatenate into one #!/bin/sh script -- before broch.service is ever enabled.)
    # ConditionPathIsMountPoint keeps broch.service from starting -- at first boot OR any reboot --
    # unless the block volume is actually mounted at /mnt/broch-data; RequiresMountsFor orders it
    # after the fstab-generated .mount so it WAITS for the mount instead of racing it. Without this,
    # an unmounted volume lets docker bind-mount an EMPTY /mnt/broch-data/postgresql on the ephemeral
    # rootfs and Postgres initialises a blank database -- silent data loss on the recreate upgrade
    # path. Mirrors bicep/azure-vm + cloudformation/aws-vm (which guard /var/lib/docker/volumes the
    # same way, with a comment naming this exact hazard). Error-check the write: if it silently failed
    # (e.g. a full OS disk) broch would later start unguarded against an empty path -- abort loud.
    mkdir -p /etc/systemd/system/broch.service.d
    printf '[Unit]\nConditionPathIsMountPoint=/mnt/broch-data\nRequiresMountsFor=/mnt/broch-data\n' > /etc/systemd/system/broch.service.d/10-require-data-mount.conf || { echo "FATAL: could not write broch mount guard" >&2; exit 1; }
    DEV_LINK=/dev/disk/by-id/scsi-0DO_Volume_${deployment_name}-data
    # Let any pending udev events drain so the by-id symlink is materialised.
    udevadm settle --timeout=60 || true
    DEVICE=""
    for attempt in $(seq 1 30); do
      if [ -e "$DEV_LINK" ]; then
        DEVICE=$(readlink -f "$DEV_LINK")
        break
      fi
      echo "waiting for block volume device $DEV_LINK (attempt $attempt/30)..."
      udevadm settle --timeout=10 || true
      sleep 2
    done
    if [ -z "$DEVICE" ] || [ ! -b "$DEVICE" ]; then
      echo "::error::block volume device $DEV_LINK never appeared -- refusing to continue (postgres password + master key would land on ephemeral rootfs and the DB would not persist)."
      echo "FATAL: block volume not attached; aborting cloud-init." >&2
      exit 1
    fi
    # Settle udev BEFORE format-detection so a just-attached volume's uevents are fully replayed
    # (the wait loop breaks the instant the symlink exists, which can be before the kernel finishes).
    udevadm settle --timeout=30 || true
    # blkid exit codes (util-linux): 0=filesystem found (KEEP -- a reattached volume with surviving
    # Postgres data + master key + password), 2=nothing found (a BLANK volume -- the normal
    # first-deploy case -> mkfs), 4=usage error, 8=ambiguous/garbled probe. mkfs ONLY on rc 2. On
    # ANYTHING else (4/8 or an unexpected code) ABORT rather than `mkfs -F`, which would WIPE a volume
    # that may hold the surviving data dir. The old `if ! blkid "$DEVICE" | grep -q ext4; then mkfs -F`
    # reformatted on EVERY non-zero blkid (a transient probe error, rc 4/8, or any non-ext4 signature)
    # -- a data-loss bug. Branch on the exact code instead, matching azure-vm/aws-vm. (An abort leaves
    # the volume unformatted+unmounted; the drop-in above keeps broch from starting blank. runcmd is
    # first-boot-only -- recover by redeploying once the volume is healthy.)
    blkid_rc=0
    blkid "$DEVICE" >/dev/null 2>&1 || blkid_rc=$?
    if [ "$blkid_rc" -eq 2 ]; then mkfs.ext4 -F "$DEVICE"; elif [ "$blkid_rc" -ne 0 ]; then echo "FATAL: blkid rc $blkid_rc on $DEVICE -- not a clean blank(2)/formatted(0) result; refusing to format a possibly-populated volume" >&2; exit 1; fi
    # Fail LOUD on mount failure: an unchecked mount silently drops the Postgres data dir, master key,
    # and DB password onto the ephemeral rootfs (destroyed on the next recreate). runcmd has no `set -e`.
    mount -o defaults,nofail,discard "$DEVICE" /mnt/broch-data || { echo "FATAL: mounting the data volume at /mnt/broch-data failed -- refusing to continue (postgres password + master key would land on ephemeral rootfs)" >&2; exit 1; }
    # fstab pass field 0 (not 2): never boot-fsck this optional data disk -- ext4 journals, and a `2`
    # would schedule systemd-fsck@<dev> which can escalate to emergency.target if the volume is slow
    # to attach or absent (a real race on DigitalOcean). Mirrors the azure-vm side.
    echo "$DEVICE /mnt/broch-data ext4 defaults,nofail,discard 0 0" >> /etc/fstab
  - mkdir -p /mnt/broch-data/postgresql
  - chown -R 999:999 /mnt/broch-data/postgresql

  # Generate (or restore) the bundled-Postgres password ON the droplet, so the DB credential
  # never enters droplet user_data (the link-local metadata endpoint is reachable from any
  # container; the DO API exposes user_data to the account-token holder).
  #
  # MUST persist across a droplet recreate: the README upgrade flow recreates the droplet, and
  # Postgres IGNORES POSTGRES_PASSWORD once its data dir is initialised -- so a freshly-rolled
  # password would lock broch out of the surviving database on the block volume. We therefore
  # store the password in a file ON THE BLOCK VOLUME (which survives recreate) and reuse it if
  # present; only a brand-new volume mints a fresh one. This runs AFTER the volume is mounted.
  # URL-safe value (base64 then strip non-alphanumerics) so it is safe in a Host=...;Password=...
  # connection string. (`$${...}` is escaped for templatefile so it reaches the disk verbatim.)
  - |
    PW_FILE=/mnt/broch-data/postgres-password
    # UPGRADE GUARD: a volume from an OLDER module version can hold an initialised Postgres data
    # dir WITHOUT a persisted password file (older versions took the password as a Terraform
    # variable instead of generating it on-box). Minting a fresh password against that data dir
    # would lock broch out of its own database (Postgres ignores POSTGRES_PASSWORD once the data
    # dir exists) -- so fail LOUDLY with the recovery step instead of generating one. Fresh
    # volumes (no PG_VERSION) are unaffected. See README.md "Upgrading the broch image".
    if [ ! -s "$PW_FILE" ] && [ -e /mnt/broch-data/postgresql/PG_VERSION ]; then
      echo "::error::existing Postgres data dir found but no $PW_FILE -- this volume was initialised by an older module version." >&2
      echo "FATAL: write the password that database was initialised with to $PW_FILE (mode 0600) and recreate the droplet. Refusing to mint a fresh password that cannot open the existing database." >&2
      exit 1
    fi
    if [ -s "$PW_FILE" ]; then
      PG_PASSWORD=$(cat "$PW_FILE")
    else
      PG_PASSWORD=$(openssl rand -base64 36 | tr -dc 'A-Za-z0-9' | head -c 40)
      umask 077
      printf '%s' "$${PG_PASSWORD}" > "$PW_FILE"
      chmod 0600 "$PW_FILE"
    fi
    if grep -q '^POSTGRES_PASSWORD=__GENERATED_AT_RUNTIME__' /opt/broch/.env; then
      sed -i "s|^POSTGRES_PASSWORD=__GENERATED_AT_RUNTIME__|POSTGRES_PASSWORD=$${PG_PASSWORD}|" /opt/broch/.env
      chmod 0600 /opt/broch/.env
    fi

  # Generate (or restore) the BROCH_MASTER_KEY ON the droplet, the same way as the postgres
  # password above. This is the customer-owned at-rest encryption root -- the vendor never
  # receives it, and it is NEVER baked into droplet user_data.
  #
  # MUST persist across a droplet recreate: ASP.NET Data Protection keys (auth/session cookies,
  # OIDC correlation/nonce state) are stored in Postgres SEALED with this master key. The README
  # upgrade flow recreates the droplet against the SURVIVING block volume, so a freshly-rolled
  # master key could no longer decrypt those keys -- breaking auth, cookies, and OIDC sign-in
  # against an otherwise-intact database. We therefore store the master key in a file ON THE BLOCK
  # VOLUME (which survives recreate) and reuse it if present; only a brand-new volume mints a fresh
  # one. This runs AFTER the volume is mounted (it depends on /mnt/broch-data existing).
  # (`$${...}` is escaped for templatefile so it reaches the disk verbatim.)
  - |
    MK_FILE=/mnt/broch-data/master-key
    if [ -s "$MK_FILE" ]; then
      MASTER_KEY=$(cat "$MK_FILE")
    else
      MASTER_KEY=$(openssl rand -base64 48 | tr -d '\n')
      umask 077
      printf '%s' "$${MASTER_KEY}" > "$MK_FILE"
      chmod 0600 "$MK_FILE"
    fi
    if grep -q '^BROCH_MASTER_KEY=__GENERATED_AT_RUNTIME__' /opt/broch/.env; then
      sed -i "s|^BROCH_MASTER_KEY=__GENERATED_AT_RUNTIME__|BROCH_MASTER_KEY=$${MASTER_KEY}|" /opt/broch/.env
      chmod 0600 /opt/broch/.env
    fi

  # Start Broch via the (guarded) systemd unit rather than a bare `docker compose up -d`, so the
  # ConditionPathIsMountPoint drop-in gates FIRST boot too: if the data volume did not mount,
  # broch.service is skipped (fails closed) instead of initialising Postgres on the ephemeral rootfs.
  - systemctl daemon-reload
  # Install the metadata-endpoint DROP rule BEFORE any container starts, so a container can never read
  # the IdP client secret / DNS-01 token from droplet user_data via 169.254.169.254.
  - systemctl enable --now broch-metadata-firewall.service
  - systemctl enable --now broch.service
